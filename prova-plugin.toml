# Plugin manifest — the analogue of archetect's archetype.yaml. Declares the entry file (so
# resolution never depends on the consumer's chosen alias), the compatibility range, and metadata a
# registry can index. Plugins are self-contained: they depend on prova and its primitives, nothing
# else — there is no dependency resolver (see the prova ecosystem docs).
[plugin]
name        = "rabbitmq"
entry       = "rabbitmq.lua"
description = "RabbitMQ resource for Prova — docker-exec over rabbitmqadmin, zero native code"
license     = "MIT"

[requires]
prova = ">=0.2, <0.3"
